  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Application
        run: |
          echo "Compiling code..."
          echo "Build complete."

  # Stage 2: Test
  test:
    needs: build # This stage waits for 'build' to finish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          echo "Executing tests..."
          echo "All tests passed!"

  # Stage 3: Deploy
  deploy:
    needs: test # This stage only runs if 'test' passes
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        run: |
          echo "Connecting to server..."
          echo "Deploying application..."
          echo "Application is live!"